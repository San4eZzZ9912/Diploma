spring:
  application:
    name: robot-warehouse-backend

  datasource:
    url: jdbc:postgresql://localhost:5433/warehouse_db
    username: warehouse
    password: warehouse

  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true